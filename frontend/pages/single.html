<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Single Algorithm</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>OS Scheduler</h2>
    <a href="../index.html">Home</a>
    <a href="single.html" class="active">Single Run</a>
    <a href="compare.html">Compare All</a>
    <a href="about.html">About</a>
  </aside>

  <main class="main">
    <h1>Single Algorithm Execution</h1>

    <section class="panel">
      <div class="grid">
        <label>Algorithm
          <select id="algorithm">
            <option value="fcfs">FCFS</option>
            <option value="sjf">SJF</option>
            <option value="rr">Round Robin</option>
            <option value="priority">Priority</option>
          </select>
        </label>

        <label>Time Quantum <input id="quantum" type="number" value="2" /></label>
        <label>Context Switch <input id="contextSwitch" type="number" value="1" /></label>
        <label>CPU Cores <input id="cores" type="number" value="1" /></label>
        <label>Aging Threshold <input id="agingThreshold" type="number" value="8" /></label>
      </div>

      <h2>Processes</h2>
      <table id="processTable">
        <thead>
          <tr>
            <th>PID</th><th>Arrival</th><th>Burst</th><th>Priority</th><th>I/O Start</th><th>I/O Duration</th><th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <button type="button" onclick="addRow()">Add Process</button>
      <button type="button" onclick="loadSample()">Load Sample</button>
      <button type="button" onclick="runSingle()">Run</button>
      <button type="button" onclick="saveSimulation()">Save Result</button>
      <button type="button" onclick="window.print()">Export PDF</button>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="panel">
      <h2>Gantt Chart</h2>
      <div id="gantt" class="gantt"></div>
    </section>

    <section class="panel">
      <h2>Process Metrics</h2>
      <table id="resultTable">
        <thead>
          <tr><th>PID</th><th>Completion</th><th>Waiting</th><th>Turnaround</th><th>Response</th><th>Starvation</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Queue Snapshots</h2>
      <div id="snapshots"></div>
    </section>
  </main>

  <script src="../js/app.js"></script>
</body>
</html>
